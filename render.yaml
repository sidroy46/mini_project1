services:
  - type: web
    name: face-attendance-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: chmod +x mvnw && ./mvnw -DskipTests clean package
    startCommand: java -Dserver.port=$PORT -jar target/backend-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
